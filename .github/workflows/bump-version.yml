name: Bump version

on:
  push:
    branches: [master]
    paths-ignore:
      - 'package.json'
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%B)"
          if echo "$COMMIT_MSG" | grep -q "BREAKING CHANGE"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -q "^feat!"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -q "^feat"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Bump version
        id: version
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: ${{ steps.bump.outputs.type }}
          RELEASE_BRANCHES: master

      - name: Update package.json
        run: |
          VER="${{ steps.version.outputs.new_tag }}"
          VER="${VER#v}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VER\"/" package.json

      - name: Update CHANGELOG.md
        run: |
          VER="${{ steps.version.outputs.new_tag }}"
          VER="${VER#v}"
          DATE="$(date +%Y-%m-%d)"
          CHANGES="$(git log --oneline $(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo '')..HEAD | sed 's/^/- /')"
          sed -i "/^## \[Unreleased\]/a \\\n## [$VER] - $DATE\n$CHANGES" CHANGELOG.md

      - name: Commit and push
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add package.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_tag }}"
          git push
